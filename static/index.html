<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kochler Fiyat Otomasyonu v0.5</title><link rel="stylesheet" href="style.css?v=0.5"></head>
<body><aside><div class="brand"><span>K</span><div>Kochler<small>Fiyat Otomasyonu · v0.9</small></div></div><nav><button class="active" data-view="dashboard">Genel Bakış</button><button data-view="sentos">Sentos Bağlantısı</button><button data-view="calculator">Otomatik Fiyat</button><button data-view="products">Ürünler</button><button data-view="offers">Komisyon Teklifleri</button><button data-view="campaigns">Kampanyalar</button><button data-view="channels">Komisyon ve Kesintiler</button><button data-view="shipping">Kargo Tarifeleri</button><button data-view="update">Güncellemeler</button></nav><div class="mode">● DENEME MODU<small>Sentos'a fiyat gönderilmez</small></div></aside>
<main><header><div><h1 id="title">Genel Bakış</h1><p>Fiyatlarınızı güvenle planlayın ve takip edin.</p></div><div class="today" id="today"></div></header><section id="content"></section></main>
<dialog id="campaignDialog"><form id="campaignForm"><h2>Kampanya Planla</h2><div class="grid"><label>Ürün<select name="product_id" id="cpProduct"></select></label><label>Pazaryeri<select name="channel" id="cpChannel"></select></label><label>Normal fiyat<input name="normal_price" type="number" step=".01" required></label><label>Kampanya fiyatı<input name="campaign_price" type="number" step=".01" required></label><label>Normal komisyon %<input name="normal_rate" type="number" step=".01"></label><label>Kampanya komisyonu %<input name="campaign_rate" type="number" step=".01"></label><label>Başlangıç<input name="starts" type="datetime-local" required></label><label>Bitiş<input name="ends" type="datetime-local" required></label><label>Satıcı indirimi %<input name="seller_discount" type="number" step=".01" value="0"></label><label>Pazaryeri katkısı %<input name="marketplace_share" type="number" step=".01" value="0"></label></div><div class="actions"><button type="button" class="ghost" onclick="campaignDialog.close()">Vazgeç</button><button>Takvime Kaydet</button></div></form></dialog>
<script src="app.js?v=0.9"></script></body></html>
